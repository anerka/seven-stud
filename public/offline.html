<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c1512" />
    <title>Offline — Seven Card Stud</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0c1512;
        color: #e8f0e8;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        text-align: center;
        line-height: 1.5;
      }
      .box {
        max-width: 22rem;
      }
      a {
        color: #9dccb8;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>You’re offline</h1>
      <p>
        Seven Card Stud needs a connection the first time, or open the app again
        after you’ve played once so it can load from cache.
      </p>
      <p><a href="./">Try again</a></p>
    </div>
  </body>
</html>
